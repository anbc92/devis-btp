{% extends "base.html" %}
{% block title %}Mot de passe oublié{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="card auth-card">
    <h1>Mot de passe oublié</h1>
    <p class="muted">Indiquez votre e-mail : un lien de réinitialisation vous sera envoyé.</p>
    <form method="post" action="{{ url_for('mot_de_passe_oublie') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="field">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required
               placeholder="vous@entreprise.fr">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Envoyer le lien</button>
      </div>
    </form>
    <p class="muted auth-alt">
      <a href="{{ url_for('connexion') }}">Retour à la connexion</a>
    </p>
  </div>
</div>
{% endblock %}
